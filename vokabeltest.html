/* ====== HILFSFUNKTIONEN ====== */
const el = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

// Normalisierung für Antwortvergleich (Umlaute -> ae/oe/ue, Kleinschreibung)
function norm(s){
  return s.toLowerCase().replace(/[’`´]/g,"'").trim()
    .replace(/[.,;!?]+$/,"")
    .replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss")
    .replace(/\s+/g," ").trim();
}
// erzeugt akzeptierte Antworten aus einem Roh-String (mehrere Synonyme, Klammern optional)
function acceptSet(raw, lang){
  const out=new Set();
  const alts = raw.split(/[;,]|\s\/\s|\//).map(s=>s.trim()).filter(Boolean);
  alts.push(raw);
  alts.forEach(a=>{
    const withC = a.replace(/[()]/g,"");          // Klammerinhalt behalten
    const without = a.replace(/\([^)]*\)/g,"");    // Klammerinhalt weg
    [withC,without].forEach(v=>{
      // Marker entfernen (AE, BE, pl, sth., sb.)
      v = v.replace(/\b(AE|BE|pl)\b/g,"").replace(/\bsth\.?\b/g,"").replace(/\bsb\.?\b/g,"");
      let n = norm(v);
      if(n) out.add(n);
      if(lang==="en" && n.startsWith("to ")) out.add(n.slice(3));
    });
  });
  out.delete("");
  return out;
}
function checkText(input, acceptSetObj){
  const v = norm(input);
  if(!v) return false;
  if(acceptSetObj.has(v)) return true;
  // auch "to xyz" tolerieren
  if(acceptSetObj.has("to "+v)) return true;
  return false;
}

/* ====== TEST AUFBAUEN ====== */
let questions=[], idx=0, score=0, wrong=[], answered=false, playerName="";

el('startInfo').textContent = `${NUM_QUESTIONS} Vokabeln · gemischt aus ${VOCAB.length} · Multiple Choice, Tippen, Lückentext & Schreiben`;

// findet das Stichwort im Beispielsatz (für Lückentext)
function buildCloze(item){
  if(!item.ex || item.ex.length<8) return null;
  let cand = item.en.replace(/\b(AE|BE|pl)\b/g,"").replace(/\([^)]*\)/g,"").replace(/,.*$/,"").trim();
  cand = cand.replace(/^to\s+/i,"");
  const tryFind = (term)=>{
    const re = new RegExp("\\b"+escRe(term)+"(s|es|ing|ed)?\\b","i");
    const m = item.ex.match(re);
    return m ? {index:m.index, text:m[0]} : null;
  };
  let hit = tryFind(cand);
  if(!hit){
    const words = cand.split(/\s+/).filter(w=>w.length>3);
    for(let i=words.length-1;i>=0 && !hit;i--) hit = tryFind(words[i]);
  }
  if(!hit) return null;
  const sentence = item.ex.slice(0,hit.index) + "§§§" + item.ex.slice(hit.index+hit.text.length);
  const acc = acceptSet(cand,"en"); acc.add(norm(hit.text));
  return {sentence, accept:acc, solution:hit.text};
}

function makeQuestions(){
  const pick = shuffle(VOCAB).slice(0, Math.min(NUM_QUESTIONS, VOCAB.length));
  const types = ["mc","type","cloze","spell"];
  return pick.map(item=>{
    let type = types[Math.floor(Math.random()*types.length)];
    if(type==="cloze" && !buildCloze(item)) type="type"; // Fallback wenn kein Lückentext möglich
    const dir = Math.random()<0.5 ? "en2de" : "de2en";

    if(type==="mc"){
      const ask = dir==="en2de" ? item.en : item.de.split(",")[0].trim();
      const correct = dir==="en2de" ? item.de.split(",")[0].trim() : item.en;
      const pool = VOCAB.filter(v=>v!==item);
      const distract = shuffle(pool).slice(0,3).map(v=> dir==="en2de" ? v.de.split(",")[0].trim() : v.en);
      const options = shuffle([correct,...distract]);
      return {type, dir, item, ask, options, answer:options.indexOf(correct),
              hintLabel: dir==="en2de" ? "Was heißt das auf Deutsch?" : "What is the English word?"};
    }
    if(type==="cloze"){
      const c = buildCloze(item);
      return {type, item, cloze:c, accept:c.accept, solution:c.solution};
    }
    if(type==="spell"){ // Deutsch zeigen, englisches Wort schreiben (mit Tipp)
      const sol = item.en.replace(/\b(AE|BE|pl)\b/g,"").replace(/\([^)]*\)/g,"").replace(/^to\s+/i,"").split(",")[0].trim();
      const hint = sol.replace(/[A-Za-z]/g,(ch,i)=> i===0?ch:"·");
      return {type, item, ask:item.de, accept:acceptSet(item.en,"en"), solution:item.en, hint};
    }
    // type: Übersetzung tippen (gemischte Richtung)
    const ask = dir==="en2de" ? item.en : item.de;
    const accept = dir==="en2de" ? acceptSet(item.de,"de") : acceptSet(item.en,"en");
    const solution = dir==="en2de" ? item.de : item.en;
    return {type:"type", dir, item, ask, accept, solution,
            hintLabel: dir==="en2de" ? "Deutsche Übersetzung eingeben:" : "Englische Übersetzung eingeben:"};
  });
}

/* ====== START ====== */
el('startBtn').onclick=()=>{
  playerName = el('playerName').value.trim();
  if(!playerName){ alert('Bitte zuerst deinen Namen eingeben.'); el('playerName').focus(); return; }
  questions = makeQuestions();
  idx=0; score=0; wrong=[];
  el('start').classList.add('hidden'); el('result').classList.add('hidden');
  el('teacher').classList.add('hidden');
  el('quiz').classList.remove('hidden');
  el('qName').textContent = playerName;
  render();
};

/* ====== FRAGE ANZEIGEN ====== */
function render(){
  answered=false;
  const q=questions[idx];
  el('qCounter').textContent=`Frage ${idx+1} / ${questions.length}`;
  el('bar').style.width=(idx/questions.length*100)+'%';
  el('feedback').className='feedback'; el('feedback').innerHTML='';
  el('nextBtn').disabled=true;
  el('nextBtn').textContent=(idx===questions.length-1)?'Ergebnis':'Weiter';
  const body=el('qBody'), area=el('answerArea');
  body.innerHTML=''; area.innerHTML='';
  const tags={mc:'Multiple Choice', type:'Übersetzen', cloze:'Lückentext', spell:'Wort schreiben'};
  el('qTag').textContent=tags[q.type];

  if(q.type==='mc'){
    body.innerHTML=`<div class="qsub">${q.hintLabel}</div><div class="qtext">${esc(q.ask)}</div>`;
    q.options.forEach((opt,i)=>{
      const b=document.createElement('button');
      b.className='answer'; b.textContent=opt;
      b.onclick=()=>answerMC(i,b);
      area.appendChild(b);
    });
  } else if(q.type==='cloze'){
    const html=esc(q.cloze.sentence).replace("§§§","<u>_____</u>");
    body.innerHTML=`<div class="qsub">Ergänze das fehlende englische Wort:</div><div class="cloze">${html}</div>`;
    textInput(area,'Englisches Wort …');
  } else if(q.type==='spell'){
    body.innerHTML=`<div class="qsub">Schreibe das englische Wort:</div><div class="qtext">${esc(q.ask)}</div>`+
                   `<small class="hint">Tipp: ${esc(q.hint)}</small>`;
    textInput(area,'English word …');
  } else {
    body.innerHTML=`<div class="qsub">${q.hintLabel}</div><div class="qtext">${esc(q.ask)}</div>`;
    textInput(area, q.dir==='en2de'?'Deutsch …':'English …');
  }
}
function textInput(area, ph){
  const inp=document.createElement('input');
  inp.className='text-ans'; inp.type='text'; inp.placeholder=ph; inp.autocomplete='off';
  inp.spellcheck=false;
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!answered) answerText(inp); });
  area.appendChild(inp);
  const b=document.createElement('button'); b.textContent='Prüfen'; b.style.marginTop='12px';
  b.onclick=()=>{ if(!answered) answerText(inp); };
  area.appendChild(b);
  setTimeout(()=>inp.focus(),50);
}

function answerMC(i,btn){
  if(answered)return; answered=true;
  const q=questions[idx];
  [...el('answerArea').querySelectorAll('.answer')].forEach(b=>b.disabled=true);
  const ok=i===q.answer;
  el('answerArea').querySelectorAll('.answer')[q.answer].classList.add('correct');
  if(!ok) btn.classList.add('wrong');
  finish(ok, q.options[q.answer], q.options[i]);
}
function answerText(inp){
  if(answered)return; answered=true;
  const q=questions[idx];
  const ok=checkText(inp.value, q.accept);
  inp.disabled=true; inp.style.borderColor= ok?'var(--good)':'var(--bad)';
  finish(ok, q.solution, inp.value||'(leer)');
}
function finish(ok, solution, given){
  const q=questions[idx];
  if(ok) score++;
  else wrong.push({q: questionLabel(q), sol:solution, given});
  const f=el('feedback'); f.classList.add('show', ok?'ok':'no');
  f.innerHTML = ok ? '✅ Richtig!'
    : `❌ Leider falsch. Richtige Antwort: <b>${esc(solution)}</b>`+
      (q.item.de&&q.item.en ? `<br><span class="pill">${esc(q.item.en)} = ${esc(q.item.de)}</span>` : '');
  el('bar').style.width=((idx+1)/questions.length*100)+'%';
  el('nextBtn').disabled=false;
}
function questionLabel(q){
  if(q.type==='cloze') return 'Lückentext: '+q.item.en;
  return q.ask || q.item.en;
}

el('nextBtn').onclick=()=>{ if(idx<questions.length-1){idx++;render();} else showResult(); };
el('quitBtn').onclick=()=>{ if(confirm('Test abbrechen? Das Ergebnis wird nicht gespeichert.')) goHome(); };

/* ====== ERGEBNIS ====== */
async function showResult(){
  el('quiz').classList.add('hidden');
  el('result').classList.remove('hidden');
  const total=questions.length, pct=Math.round(score/total*100);
  el('scoreBig').textContent=`${score} / ${total}`;
  let msg = pct>=90?'🏆 Ausgezeichnet!':pct>=75?'👍 Sehr gut!':pct>=50?'🙂 Solide – weiter üben!':'📚 Dranbleiben!';
  el('scoreSub').textContent=`${pct} % richtig · ${msg}`;
  const ww=el('wrongWrap'); ww.innerHTML='';
  if(wrong.length){
    let h='<h2 style="margin-top:18px;font-size:1.05rem">Diese Vokabeln nochmal anschauen:</h2><div class="wrongList">';
    wrong.forEach(w=>{ h+=`<div><span class="w-q">${esc(w.q)}</span><br>
      <span class="w-a">✓ ${esc(w.sol)}</span> &nbsp; <span class="w-u">✗ ${esc(w.given)}</span></div>`; });
    ww.innerHTML=h+'</div>';
  } else ww.innerHTML='<p class="center" style="color:var(--good)">Alles richtig – perfekt! 🌟</p>';
  // Ergebnis speichern
  el('saveStatus').textContent='Speichere Ergebnis …';
  try{ await saveResult(playerName, score, total); el('saveStatus').textContent = ONLINE?'✅ Ergebnis gespeichert.':'💾 Lokal gespeichert (Online-Speicher noch nicht eingerichtet).'; }
  catch(e){ el('saveStatus').textContent='⚠️ Konnte nicht gespeichert werden: '+e.message; }
}
el('retryBtn').onclick=()=>el('startBtn').click();
el('homeBtn').onclick=goHome;
function goHome(){ ['quiz','result','teacher'].forEach(i=>el(i).classList.add('hidden')); el('start').classList.remove('hidden'); }

/* ====== SPEICHERN / LADEN (Supabase + Fallback) ====== */
async function saveResult(name, points, total){
  const row={ name, points, total, percent:Math.round(points/total*100), played_at:new Date().toISOString() };
  if(!ONLINE){
    const list=JSON.parse(localStorage.getItem("vokabel_results")||"[]");
    list.push(row); localStorage.setItem("vokabel_results",JSON.stringify(list)); return;
  }
  const r=await fetch(SUPABASE_URL+"/rest/v1/"+TABLE,{
    method:"POST",
    headers:{ "apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,
              "Content-Type":"application/json","Prefer":"return=minimal" },
    body: JSON.stringify({name, points, total, percent:row.percent})
  });
  if(!r.ok) throw new Error("HTTP "+r.status);
}
async function loadResults(){
  if(!ONLINE){
    return JSON.parse(localStorage.getItem("vokabel_results")||"[]")
      .map(r=>({name:r.name,points:r.points,total:r.total,percent:r.percent,created_at:r.played_at}));
  }
  const r=await fetch(SUPABASE_URL+"/rest/v1/"+TABLE+"?select=name,points,total,percent,created_at&order=created_at.desc&limit=2000",
    { headers:{ "apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY }});
  if(!r.ok) throw new Error("HTTP "+r.status);
  return await r.json();
}

/* ====== LEHRER-ANSICHT ====== */
el('teacherLink').onclick=()=>{ el('start').classList.add('hidden'); el('teacher').classList.remove('hidden');
  el('teacherData').classList.add('hidden'); el('teacherLogin').classList.remove('hidden'); el('teacherPw').value=''; el('pwErr').textContent=''; el('teacherPw').focus(); };
el('teacherBack').onclick=goHome;
el('teacherBack2').onclick=goHome;
el('teacherPw').addEventListener('keydown',e=>{ if(e.key==='Enter') el('teacherEnter').click(); });
el('teacherEnter').onclick=()=>{
  if(el('teacherPw').value!==TEACHER_PASSWORD){ el('pwErr').textContent='Falsches Passwort.'; return; }
  el('teacherLogin').classList.add('hidden'); el('teacherData').classList.remove('hidden');
  loadAndRender();
};
el('refreshBtn').onclick=loadAndRender;

let resultsCache=[], sortKey='created_at', sortDir=-1;
async function loadAndRender(){
  el('resCount').textContent='Lädt …';
  try{ resultsCache=await loadResults(); renderTable(); }
  catch(e){ el('resCount').textContent='⚠️ Fehler beim Laden: '+e.message; }
}
function renderTable(){
  const data=[...resultsCache].sort((a,b)=>{
    let x=a[sortKey], y=b[sortKey];
    if(sortKey==='name'){ x=(x||'').toLowerCase(); y=(y||'').toLowerCase(); return x<y?-1*sortDir:x>y?1*sortDir:0; }
    return ((x||0)-(y||0))*sortDir;
  });
  el('resCount').textContent=`${resultsCache.length} Ergebnis(se)`;
  const cols=[['name','Name'],['points','Punkte'],['total','von'],['percent','%'],['created_at','Datum / Uhrzeit']];
  const thead=el('resTable').querySelector('thead');
  thead.innerHTML='<tr>'+cols.map(c=>`<th data-k="${c[0]}">${c[1]}</th>`).join('')+'</tr>';
  thead.querySelectorAll('th').forEach(th=>th.onclick=()=>{ const k=th.dataset.k; if(sortKey===k) sortDir*=-1; else {sortKey=k; sortDir=(k==='name'?1:-1);} renderTable(); });
  const tb=el('resTable').querySelector('tbody');
  tb.innerHTML = data.map(r=>{
    const d=r.created_at?new Date(r.created_at):null;
    const ds=d?d.toLocaleString('de-AT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    return `<tr><td>${esc(r.name)}</td><td class="num">${r.points}</td><td class="num">${r.total}</td><td class="num">${r.percent}%</td><td>${ds}</td></tr>`;
  }).join('') || '<tr><td colspan="5" class="center" style="color:var(--muted)">Noch keine Ergebnisse.</td></tr>';
}
el('csvBtn').onclick=()=>{
  const rows=[['Name','Punkte','von','Prozent','Datum/Uhrzeit']];
  [...resultsCache].sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(r=>{
    const d=r.created_at?new Date(r.created_at).toLocaleString('de-AT'):'';
    rows.push([r.name, r.points, r.total, r.percent+'%', d]);
  });
  const csv='﻿'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='vokabeltest_ergebnisse.csv'; a.click(); URL.revokeObjectURL(a.href);
};
</script>
